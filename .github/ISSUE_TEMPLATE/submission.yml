name: Daily AGI Radar Submission
description: Recommend a GitHub project, SkillHub skill, or article for review.
title: "[submission] "
labels:
  - submission
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - github
        - skill
        - article
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      description: GitHub repository URL, skillhub.cn skill URL, or article URL.
      placeholder: https://github.com/owner/repo
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Submissions are reviewed before entering public feeds. News submissions are not accepted in the MVP.
